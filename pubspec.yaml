name: zenith_budget
description: "Zenith - Smart Budget Tracker with GPay auto-detection"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  sqflite: ^2.4.1
  path: ^1.9.0
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  flutter_local_notifications: ^18.0.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  local_auth: ^2.3.0
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0A0A14"
  adaptive_icon_foreground: "assets/icon.png"